name: pocket_pulse
description: PocketPulse budgeting app (Flutter + local DB).
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  flutter_timezone: ^2.1.0
  shared_preferences: ^2.2.3
  
  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Local DB (offline-first)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Drift codegen
  drift_dev: ^2.20.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/seed/default_categories.json

